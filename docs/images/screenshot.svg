<svg xmlns="http://www.w3.org/2000/svg" width="400" height="620" viewBox="0 0 400 620">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="620" fill="#3B5998" rx="8"/>

  <!-- Top bar: code button -->
  <rect x="20" y="12" width="40" height="36" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="40" y="35" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">&lt;/&gt;</text>

  <!-- Top bar: donate button -->
  <rect x="310" y="12" width="72" height="36" rx="10" fill="#D9534F"/>
  <text x="346" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Donate</text>

  <!-- White card -->
  <rect x="24" y="64" width="352" height="480" rx="16" fill="white" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="200" y="112" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#2C3E6B" text-anchor="middle">QR Code Generator</text>

  <!-- Subtitle -->
  <text x="200" y="138" font-family="Arial, sans-serif" font-size="13" fill="#7a8aa8" text-anchor="middle">Enter a URL or text to generate a QR code</text>

  <!-- Input field -->
  <rect x="48" y="158" width="304" height="46" rx="10" fill="white" stroke="#3B5998" stroke-width="2"/>
  <text x="64" y="186" font-family="Arial, sans-serif" font-size="14" fill="#333">https://example.com</text>

  <!-- Generate button -->
  <rect x="48" y="218" width="304" height="46" rx="10" fill="#3B5998"/>
  <text x="200" y="246" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Generate QR Code</text>

  <!-- QR code (embedded) -->
  <image href="data:image/png;base64," x="120" y="278" width="160" height="160"/>

  <!-- Copy button -->
  <rect x="48" y="454" width="143" height="40" rx="10" fill="#f0f3fa" stroke="#dde2ec" stroke-width="2"/>
  <g transform="translate(98, 468) scale(0.75)" fill="none" stroke="#2C3E6B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="10" height="12" rx="1.5"/>
    <path d="M6 3V2a1 1 0 011-1h7a1 1 0 011 1v11a1 1 0 01-1 1h-1"/>
  </g>
  <text x="128" y="479" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#2C3E6B" text-anchor="middle">Copy</text>

  <!-- Download button -->
  <rect x="209" y="454" width="143" height="40" rx="10" fill="#f0f3fa" stroke="#dde2ec" stroke-width="2"/>
  <g transform="translate(242, 468) scale(0.75)" fill="none" stroke="#2C3E6B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 1v10M4 8l4 4 4-4"/>
    <path d="M1 13h14"/>
  </g>
  <text x="289" y="479" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#2C3E6B" text-anchor="middle">Download</text>

  <!-- Copyright -->
  <text x="200" y="590" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">&#169; 2026 Zozimus Technologies</text>
</svg>
