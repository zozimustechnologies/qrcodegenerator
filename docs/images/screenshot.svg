    <rect x="80" y="80" width="4" height="4" fill="#333"/>
    <rect x="92" y="80" width="4" height="4" fill="#333"/>
    <rect x="28" y="88" width="4" height="4" fill="#333"/>
    <rect x="40" y="88" width="4" height="4" fill="#333"/>
    <rect x="52" y="88" width="4" height="4" fill="#333"/>
    <rect x="60" y="88" width="4" height="4" fill="#333"/>
    <rect x="72" y="88" width="4" height="4" fill="#333"/>
    <rect x="84" y="88" width="4" height="4" fill="#333"/>
