    <rect x="72" y="44" width="4" height="4" fill="#333"/>
    <rect x="84" y="44" width="4" height="4" fill="#333"/>
    <rect x="0" y="52" width="4" height="4" fill="#333"/>
    <rect x="12" y="52" width="4" height="4" fill="#333"/>
    <rect x="24" y="52" width="4" height="4" fill="#333"/>
    <rect x="36" y="52" width="4" height="4" fill="#333"/>
    <rect x="48" y="52" width="4" height="4" fill="#333"/>
    <rect x="60" y="52" width="4" height="4" fill="#333"/>
    <rect x="80" y="52" width="4" height="4" fill="#333"/>
    <rect x="92" y="52" width="4" height="4" fill="#333"/>
    <rect x="0" y="60" width="4" height="4" fill="#333"/>
    <rect x="8" y="60" width="4" height="4" fill="#333"/>
    <rect x="16" y="60" width="4" height="4" fill="#333"/>
    <rect x="28" y="60" width="4" height="4" fill="#333"/>
    <rect x="40" y="60" width="4" height="4" fill="#333"/>
    <rect x="56" y="60" width="4" height="4" fill="#333"/>
    <rect x="68" y="60" width="4" height="4" fill="#333"/>
    <rect x="84" y="60" width="4" height="4" fill="#333"/>
    <rect x="28" y="72" width="4" height="4" fill="#333"/>
    <rect x="36" y="72" width="4" height="4" fill="#333"/>
    <rect x="48" y="72" width="4" height="4" fill="#333"/>
