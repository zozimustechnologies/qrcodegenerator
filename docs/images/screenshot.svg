<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <!-- Background -->
  <rect width="400" height="500" fill="#3B5998" rx="8"/>
  
  <!-- Top bar -->
  <!-- Code button -->
  <rect x="20" y="12" width="40" height="36" rx="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="40" y="35" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">&lt;/&gt;</text>
  
  <!-- Donate button -->
  <rect x="310" y="12" width="72" height="36" rx="10" fill="#D9534F"/>
  <text x="346" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Donate</text>
  
  <!-- White card -->
  <rect x="24" y="70" width="352" height="340" rx="16" fill="white" filter="url(#shadow)"/>
  
  <!-- Shadow filter -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.18"/>
    </filter>
  </defs>
  
  <!-- Card content -->
  <!-- Title -->
  <text x="200" y="120" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#2C3E6B" text-anchor="middle">QR Code Generator</text>
  
  <!-- Subtitle -->
  <text x="200" y="148" font-family="Arial, sans-serif" font-size="13" fill="#7a8aa8" text-anchor="middle">Enter a URL or text to generate a QR code</text>
  
  <!-- Input field -->
  <rect x="52" y="172" width="296" height="48" rx="10" fill="white" stroke="#dde2ec" stroke-width="2"/>
  <text x="68" y="201" font-family="Arial, sans-serif" font-size="14" fill="#aab4c8">e.g. https://example.com</text>
  
  <!-- Generate button -->
  <rect x="52" y="236" width="296" height="48" rx="10" fill="#3B5998"/>
  <text x="200" y="265" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Generate QR Code</text>
  
  <!-- QR Code placeholder (sample QR pattern) -->
  <rect x="148" y="300" width="104" height="104" rx="8" fill="white" stroke="#e8e8e8" stroke-width="1"/>
  <!-- Simplified QR code pattern -->
  <g transform="translate(152, 304)">
    <!-- Top-left finder -->
    <rect x="0" y="0" width="24" height="24" fill="#333"/>
    <rect x="4" y="4" width="16" height="16" fill="white"/>
    <rect x="8" y="8" width="8" height="8" fill="#333"/>
    <!-- Top-right finder -->
    <rect x="72" y="0" width="24" height="24" fill="#333"/>
    <rect x="76" y="4" width="16" height="16" fill="white"/>
    <rect x="80" y="8" width="8" height="8" fill="#333"/>
    <!-- Bottom-left finder -->
    <rect x="0" y="72" width="24" height="24" fill="#333"/>
    <rect x="4" y="76" width="16" height="16" fill="white"/>
    <rect x="8" y="80" width="8" height="8" fill="#333"/>
    <!-- Data dots -->
    <rect x="28" y="0" width="4" height="4" fill="#333"/>
    <rect x="36" y="0" width="4" height="4" fill="#333"/>
    <rect x="44" y="0" width="4" height="4" fill="#333"/>
    <rect x="56" y="0" width="4" height="4" fill="#333"/>
    <rect x="28" y="8" width="4" height="4" fill="#333"/>
    <rect x="40" y="8" width="4" height="4" fill="#333"/>
    <rect x="52" y="8" width="4" height="4" fill="#333"/>
    <rect x="64" y="8" width="4" height="4" fill="#333"/>
    <rect x="28" y="16" width="4" height="4" fill="#333"/>
    <rect x="36" y="16" width="4" height="4" fill="#333"/>
    <rect x="48" y="16" width="4" height="4" fill="#333"/>
    <rect x="60" y="16" width="4" height="4" fill="#333"/>
    <rect x="0" y="28" width="4" height="4" fill="#333"/>
    <rect x="8" y="28" width="4" height="4" fill="#333"/>
    <rect x="20" y="28" width="4" height="4" fill="#333"/>
