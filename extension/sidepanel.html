<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script src="backend.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=code_xml" />
</head>
<body>
    <div class="topbar">
        <button class="codebtn" id="codebtn">
            <span class="material-symbols-outlined">code_xml</span>
        </button>
        <button class="donate" id="donatebtn">Donate</button>
    </div>

    <div class="crbox">
        <h2>QR Code Generator</h2>
        <p>Enter a URL or text to generate a QR code</p>
        <form id="qrform">
            <input type="text" id="value" placeholder="e.g. https://example.com">
            <button type="submit">Generate QR Code</button>
        </form>
        <img id="qrimage" alt="Generated QR Code" title="QR Code" hidden/>
    </div>

    <h4 class="copyright">&copy; 2026 Zozimus Technologies</h4>
</body>
</html>
